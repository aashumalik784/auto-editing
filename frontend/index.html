<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Editing - AI Video Editor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="modern-header">
        <div class="header-top">
            <div class="header-left">
                <i class="fas fa-user-circle user-icon"></i>
            </div>
            <div class="header-right">
                <i class="fas fa-bell"></i>
                <i class="fas fa-cog"></i>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="top-cards">
            <div class="card new-video-card" onclick="window.location.href='editor.html'">
                <div class="card-icon">
                    <i class="fas fa-plus"></i>
                </div>
                <span class="card-label">New video</span>
                <div class="card-badge">GPT Image 2</div>
            </div>
            <div class="card edit-photo-card">
                <div class="card-icon">
                    <i class="fas fa-image"></i>
                </div>
                <span class="card-label">Edit photo</span>
            </div>
        </div>

        <div class="tools-section">
            <div class="tools-grid">
                <div class="tool-item" onclick="window.location.href='editor.html'">
                    <i class="fas fa-magic"></i>
                    <span>AutoCut</span>
                </div>
                <div class="tool-item" onclick="alert('Coming soon!')">
                    <i class="fas fa-wand-magic-sparkles"></i>
                    <span>Retouch</span>
                </div>
                <div class="tool-item" onclick="alert('Coming soon!')">                    <i class="fas fa-robot"></i>
                    <span>AI generator</span>
                </div>
                <div class="tool-item" onclick="window.location.href='editor.html'">
                    <i class="fas fa-closed-captioning"></i>
                    <span>Auto captions</span>
                </div>
                <div class="tool-item" onclick="alert('Coming soon!')">
                    <i class="fas fa-desktop"></i>
                    <span>Desktop editor</span>
                </div>
                <div class="tool-item" onclick="alert('Coming soon!')">
                    <i class="fas fa-user-slash"></i>
                    <span>Remove background</span>
                </div>
                <div class="tool-item" onclick="alert('Coming soon!')">
                    <i class="fas fa-camera"></i>
                    <span>Camera</span>
                </div>
                <div class="tool-item" onclick="alert('All tools coming soon!')">
                    <i class="fas fa-th-large"></i>
                    <span>All tools</span>
                </div>
            </div>
        </div>

        <div class="projects-section">
            <div class="section-header">
                <h2>Projects</h2>
                <button class="menu-btn" onclick="loadProjects()"><i class="fas fa-sync-alt"></i></button>
            </div>
            <div class="projects-list" id="projectsList">
                <div class="empty-state">
                    <i class="fas fa-folder-open"></i>
                    <p>No projects yet</p>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="editor.html" class="nav-item">
            <i class="fas fa-video"></i>
            <span>Editor</span>
        </a>
        <a href="dashboard.html" class="nav-item">            <i class="fas fa-folder"></i>
            <span>Projects</span>
        </a>
    </nav>

    <script src="js/api.js"></script>
    <script>
        async function loadProjects() {
            try {
                const response = await API.getProjects();
                if (response.success) {
                    displayProjects(response.projects);
                }
            } catch (error) {
                console.error('Error loading projects:', error);
            }
        }

        function displayProjects(projects) {
            const projectsList = document.getElementById('projectsList');
            if (!projects || projects.length === 0) {
                projectsList.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i><p>No projects yet</p></div>';
                return;
            }
            projectsList.innerHTML = projects.map(project => `
                <div class="project-item" onclick="openProject('${project.id}')">
                    <div class="project-thumbnail">
                        <i class="fas fa-video"></i>
                    </div>
                    <div class="project-info">
                        <h3>${project.name || 'Untitled'}</h3>
                        <p class="project-date">${new Date(project.created_at).toLocaleString()}</p>
                        <p class="project-size"><i class="fas fa-image"></i> ${project.size || '0MB'}</p>
                    </div>
                    <div class="project-menu" onclick="event.stopPropagation(); deleteProject('${project.id}')">
                        <i class="fas fa-ellipsis-v"></i>
                    </div>
                </div>
            `).join('');
        }

        function openProject(projectId) {
            window.location.href = `editor.html?project=${projectId}`;
        }

        async function deleteProject(projectId) {
            if (confirm('Delete this project?')) {
                try {
                    const response = await API.deleteProject(projectId);
                    if (response.success) {                        loadProjects();
                        alert('Project deleted!');
                    }
                } catch (error) {
                    alert('Error deleting project');
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
