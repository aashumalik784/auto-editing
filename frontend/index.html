<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Editing - AI Video Editor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="modern-header">
        <div class="header-top">
            <div class="header-left">
                <i class="fas fa-user-circle user-icon"></i>
            </div>
            <div class="header-right">
                <i class="fas fa-bell"></i>
                <i class="fas fa-cog" onclick="showSettings()"></i>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Cards -->
        <div class="top-cards">
            <div class="card new-video-card" onclick="openUploadModal()">
                <div class="card-icon">
                    <i class="fas fa-plus"></i>
                </div>
                <span class="card-label">New video</span>
                <div class="card-badge">GPT Image 2</div>
            </div>
            <div class="card edit-photo-card" onclick="openPhotoEditor()">
                <div class="card-icon">
                    <i class="fas fa-image"></i>
                </div>
                <span class="card-label">Edit photo</span>
            </div>
        </div>

        <!-- Tools Grid -->
        <div class="tools-section">
            <div class="tools-grid">
                <div class="tool-item" onclick="openAutoCut()">
                    <i class="fas fa-magic"></i>
                    <span>AutoCut</span>
                </div>
                <div class="tool-item" onclick="openRetouch()">
                    <i class="fas fa-wand-magic-sparkles"></i>
                    <span>Retouch</span>
                </div>
                <div class="tool-item" onclick="openAIGenerator()">
                    <i class="fas fa-robot"></i>
                    <span>AI generator</span>
                </div>
                <div class="tool-item" onclick="openAutoCaptions()">
                    <i class="fas fa-closed-captioning"></i>
                    <span>Auto captions</span>
                </div>
                <div class="tool-item" onclick="openDesktopEditor()">
                    <i class="fas fa-desktop"></i>
                    <span>Desktop editor</span>
                </div>
                <div class="tool-item" onclick="openRemoveBackground()">
                    <i class="fas fa-user-slash"></i>
                    <span>Remove background</span>
                </div>
                <div class="tool-item" onclick="openCamera()">
                    <i class="fas fa-camera"></i>
                    <span>Camera</span>
                </div>
                <div class="tool-item" onclick="openAllTools()">
                    <i class="fas fa-th-large"></i>
                    <span>All tools</span>
                </div>
            </div>
        </div>

        <!-- Projects Section -->
        <div class="projects-section">
            <div class="section-header">
                <h2>Projects</h2>
                <button class="menu-btn" onclick="loadProjects()">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="projects-list" id="projectsList">
                <div class="empty-state">
                    <i class="fas fa-folder-open"></i>
                    <p>No projects yet</p>
                    <button class="create-btn" onclick="openUploadModal()">
                        Create your first video
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Upload Video</h3>
                <button class="close-btn" onclick="closeUploadModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                    <h4>Drag & Drop your video here</h4>
                    <p>or</p>
                    <input type="file" id="videoInput" accept="video/*" hidden>
                    <button class="upload-btn" onclick="document.getElementById('videoInput').click()">
                        Browse Files
                    </button>
                    <p class="upload-info">Supported: MP4, AVI, MOV, MKV (Max 500MB)</p>
                </div>
                <div id="uploadProgress" class="upload-progress" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <p id="progressText">Uploading... 0%</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="editor.html" class="nav-item">
            <i class="fas fa-video"></i>
            <span>Editor</span>
        </a>
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-folder"></i>
            <span>Projects</span>
        </a>
    </nav>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
