<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Editing - AI Video Editor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="modern-header">
        <div class="header-top">
            <div class="header-left">
                <i class="fas fa-user-circle user-icon"></i>
            </div>
            <div class="header-right">
                <i class="fas fa-bell"></i>
                <i class="fas fa-cog"></i>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Cards -->
        <div class="top-cards">
            <div class="card new-video-card" onclick="window.location.href='editor.html'">
                <div class="card-icon">
                    <i class="fas fa-plus"></i>
                </div>
                <span class="card-label">New video</span>
                <div class="card-badge">GPT Image 2</div>
            </div>
            <div class="card edit-photo-card">
                <div class="card-icon">
                    <i class="fas fa-image"></i>
                </div>
                <span class="card-label">Edit photo</span>
            </div>
        </div>

        <!-- Tools Grid -->
        <div class="tools-section">
            <div class="tools-grid">
                <div class="tool-item" onclick="window.location.href='editor.html'">
                    <i class="fas fa-magic"></i>
                    <span>AutoCut</span>
                </div>
                <div class="tool-item">                    <i class="fas fa-wand-magic-sparkles"></i>
                    <span>Retouch</span>
                </div>
                <div class="tool-item">
                    <i class="fas fa-robot"></i>
                    <span>AI generator</span>
                </div>
                <div class="tool-item">
                    <i class="fas fa-closed-captioning"></i>
                    <span>Auto captions</span>
                </div>
                <div class="tool-item">
                    <i class="fas fa-desktop"></i>
                    <span>Desktop editor</span>
                </div>
                <div class="tool-item">
                    <i class="fas fa-user-slash"></i>
                    <span>Remove background</span>
                </div>
                <div class="tool-item">
                    <i class="fas fa-camera"></i>
                    <span>Camera</span>
                </div>
                <div class="tool-item">
                    <i class="fas fa-th-large"></i>
                    <span>All tools</span>
                </div>
            </div>
        </div>

        <!-- Projects Section -->
        <div class="projects-section">
            <div class="section-header">
                <h2>Projects</h2>
                <button class="menu-btn"><i class="fas fa-bars"></i></button>
            </div>
            
            <div class="projects-list" id="projectsList">
                <!-- Projects will be loaded here -->
                <div class="project-item">
                    <div class="project-thumbnail">
                        <i class="fas fa-video"></i>
                    </div>
                    <div class="project-info">
                        <h3>0501-01</h3>
                        <p class="project-date">01/05/2026 20:18</p>
                        <p class="project-size"><i class="fas fa-image"></i> 3MB</p>
                    </div>
                    <div class="project-menu">
                        <i class="fas fa-ellipsis-v"></i>                    </div>
                </div>

                <div class="project-item">
                    <div class="project-thumbnail">
                        <i class="fas fa-video"></i>
                    </div>
                    <div class="project-info">
                        <h3>0429-01</h3>
                        <p class="project-date">29/04/2026 22:10</p>
                        <p class="project-size"><i class="fas fa-cut"></i> 19MB | 01:13</p>
                    </div>
                    <div class="project-menu">
                        <i class="fas fa-ellipsis-v"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="editor.html" class="nav-item">
            <i class="fas fa-video"></i>
            <span>Editor</span>
        </a>
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-folder"></i>
            <span>Projects</span>
        </a>
    </nav>

    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
</body>
</html>
